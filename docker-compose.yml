services:
  panseek:
    image: panseek:${VERSION}
    container_name: ${CONTAINER_NAME}
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - TZ=${TZ}
      - PORT=4000
      - HOST=0.0.0.0
      - NUXT_PUBLIC_BAIDU_TONGJI_ID=${NUXT_PUBLIC_BAIDU_TONGJI_ID:-}
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:4000
    volumes:
      - ${APP_PATH}/data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
